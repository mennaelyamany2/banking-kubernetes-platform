apiVersion: v1
kind: ServiceAccount
metadata:
  name: banking-api-sa
  namespace: banking

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: banking
  name: banking-api-role
rules:
- apiGroups: [""]
  resources: ["pods", "services"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: banking-api-rolebinding
  namespace: banking
subjects:
- kind: ServiceAccount
  name: banking-api-sa
  namespace: banking
roleRef:
  kind: Role
  name: banking-api-role
  apiGroup: rbac.authorization.k8s.io