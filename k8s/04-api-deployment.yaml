apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-api
  namespace: banking

spec:
  replicas: 2

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: banking-api

  template:
    metadata:
      labels:
        app: banking-api

    spec:
      serviceAccountName: banking-api-sa

      containers:
      - name: banking-api
        image: banking-api:v2.0
        imagePullPolicy: Never

        ports:
        - containerPort: 3000

        envFrom:
        - configMapRef:
            name: banking-config
        - secretRef:
            name: banking-secret

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /api/ready
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 5